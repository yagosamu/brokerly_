{% load static %}
<header class="nxl-header">
    <div class="header-wrapper">
        <div class="header-left d-flex align-items-center gap-4">
            <a href="javascript:void(0);" class="nxl-head-mobile-toggler" id="mobile-collapse">
                <i class="feather-align-left"></i>
            </a>
            <div class="nxl-navigation-toggle">
                <a href="javascript:void(0);" id="menu-mini-button">
                    <i class="feather-align-left fs-20"></i>
                </a>
                <a href="javascript:void(0);" id="menu-full-button" class="d-none">
                    <i class="feather-align-right fs-20"></i>
                </a>
            </div>
            <div class="d-none d-md-block">
                <div class="search-form-wrapper position-relative">
                    <i class="feather-search position-absolute top-50 translate-middle-y ms-3 text-muted"></i>
                    <input type="text" class="form-control search-input-field ps-5" placeholder="Buscar clientes, apólices, sinistros…">
                </div>
            </div>
        </div>

        <div class="header-right ms-auto">
            <div class="d-flex align-items-center gap-2">
                <div class="nxl-h-item dropdown d-none d-sm-flex" id="notif-dropdown">
                    <a href="javascript:void(0);" class="nxl-head-link me-0 dropdown-toggle" title="Notificações" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" id="notif-toggle">
                        <i class="feather-bell"></i>
                        <span class="badge bg-danger nxl-h-badge d-none" id="notif-badge">0</span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end" style="width: 340px; max-height: 480px; overflow-y: auto;">
                        <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom">
                            <span class="fw-bold fs-14">Notificações</span>
                            <button type="button" class="btn btn-link btn-sm p-0 fs-11 text-primary" id="notif-mark-all">Marcar todas como lidas</button>
                        </div>
                        <div id="notif-list">
                            <div class="text-center text-muted py-4 fs-12" id="notif-empty">Sem novas notificações.</div>
                        </div>
                        <div class="border-top">
                            <a href="{% url 'notifications:list' %}" class="dropdown-item text-center fs-12 py-2 text-primary">
                                Ver todas <i class="feather-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="nxl-h-item">
                    <a href="javascript:void(0);" class="nxl-head-link me-0" title="Modo escuro">
                        <i class="feather-moon"></i>
                    </a>
                </div>

                <div class="nxl-h-item dropdown nxl-user-dropdown">
                    <a class="nxl-head-link me-0 d-flex align-items-center gap-2 dropdown-toggle" data-bs-toggle="dropdown">
                        <div class="avatar-text avatar-md">
                            <span class="fw-bold">BR</span>
                        </div>
                        <div class="d-none d-md-block text-start">
                            <div class="fs-12 fw-bold text-dark mb-0 lh-1">{{ request.user.get_full_name|default:'Brokerly' }}</div>
                            <small class="text-muted">{{ request.user.email|default:'demonstração' }}</small>
                        </div>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <a href="#" class="dropdown-item"><i class="feather-user me-2"></i>Meu perfil</a>
                        <a href="#" class="dropdown-item"><i class="feather-settings me-2"></i>Configurações</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item text-danger"><i class="feather-log-out me-2"></i>Sair</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<form id="notif-csrf-form" style="display:none;">{% csrf_token %}</form>

<script>
(function() {
    var toggleEl = document.getElementById('notif-toggle');
    var badge = document.getElementById('notif-badge');
    var listEl = document.getElementById('notif-list');
    var emptyEl = document.getElementById('notif-empty');
    var markAllBtn = document.getElementById('notif-mark-all');
    var csrfForm = document.getElementById('notif-csrf-form');
    if (!toggleEl || !badge || !listEl || !csrfForm) return;

    var csrfToken = csrfForm.querySelector('[name=csrfmiddlewaretoken]').value;
    var POLL_INTERVAL = 30000;
    var URL_UNREAD = '{% url "notifications:unread_json" %}';
    var URL_MARK_ALL = '{% url "notifications:mark_all_read" %}';

    function typeIcon(type) {
        switch (type) {
            case 'ai_summary': return 'feather-feather';
            case 'report': return 'feather-file-text';
            case 'renewal': return 'feather-clock';
            default: return 'feather-bell';
        }
    }
    function typeColor(type) {
        switch (type) {
            case 'ai_summary': return 'primary';
            case 'report': return 'info';
            case 'renewal': return 'warning';
            default: return 'success';
        }
    }
    function relativeTime(iso) {
        var diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return 'agora';
        if (diff < 3600) return Math.floor(diff / 60) + ' min';
        if (diff < 86400) return Math.floor(diff / 3600) + ' h';
        return Math.floor(diff / 86400) + ' d';
    }

    function renderItems(items) {
        listEl.innerHTML = '';
        if (!items || items.length === 0) {
            var e = document.createElement('div');
            e.className = 'text-center text-muted py-4 fs-12';
            e.textContent = 'Sem novas notificações.';
            listEl.appendChild(e);
            return;
        }
        items.forEach(function(n) {
            var a = document.createElement('a');
            a.className = 'dropdown-item d-flex align-items-start gap-2 py-2 border-bottom';
            a.href = 'javascript:void(0);';
            a.setAttribute('data-notif-id', n.id);
            a.setAttribute('data-notif-url', n.url || '');
            a.innerHTML =
                '<span class="badge bg-soft-' + typeColor(n.type) + ' text-' + typeColor(n.type) + '" style="min-width: 32px; text-align: center;">' +
                '<i class="' + typeIcon(n.type) + '"></i></span>' +
                '<div class="flex-grow-1" style="min-width: 0;">' +
                '<div class="fs-12 fw-bold text-dark text-truncate">' + escapeHtml(n.title) + '</div>' +
                (n.message ? '<div class="fs-11 text-muted text-truncate">' + escapeHtml(n.message) + '</div>' : '') +
                '<div class="fs-11 text-muted mt-1">' + relativeTime(n.created_at) + ' · ' + escapeHtml(n.type_display) + '</div>' +
                '</div>';
            listEl.appendChild(a);
        });
    }

    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, function(c) {
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
        });
    }

    function refresh() {
        fetch(URL_UNREAD, { credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (!data) return;
                var count = data.count || 0;
                badge.textContent = count > 99 ? '99+' : count;
                badge.classList.toggle('d-none', count === 0);
                renderItems(data.items || []);
            })
            .catch(function() { /* silent */ });
    }

    listEl.addEventListener('click', function(e) {
        var item = e.target.closest('[data-notif-id]');
        if (!item) return;
        e.preventDefault();
        var id = item.getAttribute('data-notif-id');
        var url = item.getAttribute('data-notif-url');
        var fd = new FormData(); fd.append('_', '1');
        fetch('/notifications/' + id + '/read/', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'X-CSRFToken': csrfToken, 'X-Requested-With': 'XMLHttpRequest' },
            body: fd,
        }).finally(function() {
            if (url) window.location.href = url;
            else refresh();
        });
    });

    if (markAllBtn) {
        markAllBtn.addEventListener('click', function(e) {
            e.preventDefault();
            var fd = new FormData(); fd.append('_', '1');
            fetch(URL_MARK_ALL, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'X-CSRFToken': csrfToken, 'X-Requested-With': 'XMLHttpRequest' },
                body: fd,
            }).then(refresh);
        });
    }

    refresh();
    setInterval(refresh, POLL_INTERVAL);
})();
</script>
